<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WorkVault — Jobs You Won't Find Anywhere Else</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#07080a;font-family:Georgia,'Times New Roman',serif;color:#e2e8f0;}
  input,button,select,textarea{font-family:Georgia,'Times New Roman',serif;}
  input::placeholder{color:#475569;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:#0d0f14;}
  ::-webkit-scrollbar-thumb{background:#1c2030;border-radius:99px;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .fade{animation:fadeIn .3s ease;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const ADMIN_EMAIL = "halaleloevershine4@gmail.com";
const ADMIN_PASS  = "Punctuati0n";

const PLANS = [
  { id:"starter", name:"Starter", price:10, color:"#38bdf8",
    perks:["Apply to 5 jobs/mo","Email job alerts","Basic search & filters"] },
  { id:"growth",  name:"Growth",  price:25, color:"#f59e0b",
    perks:["Apply to 30 jobs/mo","Priority listings","Resume tips","Direct company links"] },
  { id:"pro",     name:"Pro",     price:50, color:"#a78bfa",
    perks:["Unlimited applications","Early access roles","Career coaching","Application CRM"] },
];

const SEED_JOBS = [
  { id:1,  title:"Senior Product Designer",  company:"Notion",      loc:"Remote",        salary:"$120k–$150k", tag:"Design",      logo:"N", bg:"#191919", posted:"2h ago"  },
  { id:2,  title:"Growth Engineer",          company:"Linear",      loc:"San Francisco", salary:"$140k–$180k", tag:"Engineering", logo:"L", bg:"#5E6AD2", posted:"4h ago"  },
  { id:3,  title:"Head of Marketing",        company:"Vercel",      loc:"Remote",        salary:"$130k–$160k", tag:"Marketing",   logo:"▲", bg:"#111",    posted:"1d ago"  },
  { id:4,  title:"Staff ML Engineer",        company:"Perplexity",  loc:"New York",      salary:"$200k–$250k", tag:"Engineering", logo:"P", bg:"#1a9e9e", posted:"3h ago"  },
  { id:5,  title:"DevRel Manager",           company:"Supabase",    loc:"Remote",        salary:"$100k–$130k", tag:"Developer",   logo:"S", bg:"#3ECF8E", posted:"2d ago"  },
  { id:6,  title:"Finance Lead",             company:"Stripe",      loc:"Dublin",        salary:"$150k–$190k", tag:"Finance",     logo:"$", bg:"#635BFF", posted:"6h ago"  },
  { id:7,  title:"iOS Engineer",             company:"Figma",       loc:"Remote",        salary:"$160k–$200k", tag:"Engineering", logo:"F", bg:"#7B2FBE", posted:"5h ago"  },
  { id:8,  title:"Data Scientist",           company:"Anthropic",   loc:"San Francisco", salary:"$180k–$220k", tag:"Data",        logo:"A", bg:"#b45309", posted:"1h ago"  },
  { id:9,  title:"Brand Designer",           company:"Loom",        loc:"Remote",        salary:"$90k–$120k",  tag:"Design",      logo:"L", bg:"#625DF5", posted:"3d ago"  },
  { id:10, title:"Backend Engineer",         company:"PlanetScale", loc:"Remote",        salary:"$150k–$180k", tag:"Engineering", logo:"P", bg:"#0f172a", posted:"8h ago"  },
];

// ── DESIGN TOKENS ─────────────────────────────────────────────────────────────
const C = {
  bg:"#07080a", panel:"#0d0f14", card:"#12151c", border:"#1c2030",
  accent:"#38bdf8", gold:"#f59e0b", purple:"#a78bfa",
  text:"#e2e8f0", sub:"#94a3b8", muted:"#475569",
  success:"#22c55e", danger:"#f43f5e",
};

// ── PRIMITIVES ────────────────────────────────────────────────────────────────
function Btn({ children, onClick, color=C.accent, ghost=false, disabled=false, full=false, sm=false, style={} }) {
  const isDark = [C.accent, C.gold].includes(color);
  return (
    <button onClick={onClick} disabled={disabled} style={{
      padding: sm ? "6px 14px" : "10px 20px",
      borderRadius: 8,
      border: ghost ? `1px solid ${color}66` : "none",
      background: ghost ? "transparent" : disabled ? "#1c2030" : color,
      color: ghost ? color : disabled ? C.muted : isDark ? "#000" : "#fff",
      fontWeight: 700, fontSize: sm ? 12 : 13,
      cursor: disabled ? "not-allowed" : "pointer",
      fontFamily: "inherit", transition: "opacity .15s",
      opacity: disabled ? .5 : 1,
      width: full ? "100%" : undefined,
      ...style
    }}>{children}</button>
  );
}

function Field({ label, type="text", value, onChange, placeholder, err, icon, rows }) {
  const base = {
    width:"100%", background:C.panel, border:`1px solid ${err?C.danger:C.border}`,
    borderRadius:8, color:C.text, fontSize:14, outline:"none",
    fontFamily:"inherit", boxSizing:"border-box",
  };
  return (
    <div style={{ marginBottom:14 }}>
      {label && <label style={{ display:"block", marginBottom:5, fontSize:11, color:C.muted, fontWeight:700, textTransform:"uppercase", letterSpacing:.8 }}>{label}</label>}
      <div style={{ position:"relative" }}>
        {icon && <span style={{ position:"absolute", left:11, top: rows?"14px":"50%", transform: rows?"none":"translateY(-50%)", fontSize:14, pointerEvents:"none" }}>{icon}</span>}
        {rows
          ? <textarea rows={rows} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
              style={{ ...base, padding: icon?"11px 12px 11px 36px":"11px 14px", resize:"vertical" }} />
          : <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
              style={{ ...base, padding: icon?"11px 12px 11px 36px":"11px 14px" }} />
        }
      </div>
      {err && <div style={{ color:C.danger, fontSize:11, marginTop:3 }}>⚠ {err}</div>}
    </div>
  );
}

function Card({ children, style={} }) {
  return <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:22, ...style }}>{children}</div>;
}

function Tag({ children, color=C.accent }) {
  return <span style={{ background:color+"1a", color, border:`1px solid ${color}33`, borderRadius:99, padding:"3px 10px", fontSize:11, fontWeight:700, letterSpacing:.5 }}>{children}</span>;
}

function Modal({ title, onClose, children, wide=false }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"#000d", zIndex:300,
      display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="fade" style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:16,
        padding:28, width:"100%", maxWidth: wide?720:480, maxHeight:"92vh", overflowY:"auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22 }}>
          <h3 style={{ margin:0, color:C.text, fontSize:17, fontWeight:800 }}>{title}</h3>
          <button onClick={onClose} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:24, lineHeight:1 }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Toast({ msg, color }) {
  return (
    <div style={{ position:"fixed", bottom:28, left:"50%", transform:"translateX(-50%)",
      background:color, color:[C.accent,C.gold].includes(color)?"#000":"#fff",
      padding:"11px 26px", borderRadius:10, fontWeight:700, fontSize:13,
      zIndex:9999, boxShadow:"0 8px 30px #0009", whiteSpace:"nowrap" }}>
      {msg}
    </div>
  );
}

function Divider() {
  return <div style={{ borderTop:`1px solid ${C.border}`, margin:"16px 0" }} />;
}

// ── AUTH PAGE ─────────────────────────────────────────────────────────────────
function AuthPage({ onLogin, onRegister }) {
  const [tab, setTab]     = useState("in");
  const [email, setEmail] = useState("");
  const [name, setName]   = useState("");
  const [pw, setPw]       = useState("");
  const [pw2, setPw2]     = useState("");
  const [errs, setErrs]   = useState({});
  const [busy, setBusy]   = useState(false);

  const go = async () => {
    const e = {};
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) e.email = "Enter a valid email";
    if (pw.length < 8)       e.pw = "Min 8 characters";
    else if (!/[A-Z]/.test(pw)) e.pw = "Must include an uppercase letter";
    else if (!/\d/.test(pw))    e.pw = "Must include a number";
    if (tab === "up") {
      if (!name.trim())   e.name = "Name is required";
      if (pw !== pw2)     e.pw2  = "Passwords don't match";
    }
    setErrs(e);
    if (Object.keys(e).length) return;
    setBusy(true);
    await new Promise(r => setTimeout(r, 700));
    setBusy(false);
    tab === "in" ? onLogin(email, pw) : onRegister(email, name, pw);
  };

  return (
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center", padding:20 }}>

      <div style={{ marginBottom:44, textAlign:"center" }}>
        <div style={{ fontSize:48, fontWeight:900, letterSpacing:-2, lineHeight:1 }}>
          <span style={{ color:C.accent }}>Work</span><span style={{ color:C.text }}>Vault</span>
        </div>
        <div style={{ color:C.sub, marginTop:10, fontSize:15 }}>Jobs you won't find anywhere else.</div>
      </div>

      <div style={{ width:"100%", maxWidth:420 }}>
        <div style={{ display:"flex", background:C.panel, borderRadius:10, padding:4,
          marginBottom:22, border:`1px solid ${C.border}` }}>
          {[["in","Sign In"],["up","Create Account"]].map(([k,l]) => (
            <button key={k} onClick={()=>{setTab(k);setErrs({});}} style={{
              flex:1, padding:"10px 0", borderRadius:8, border:"none", cursor:"pointer",
              fontWeight:700, fontSize:13, fontFamily:"inherit", transition:"all .2s",
              background: tab===k ? C.accent : "transparent",
              color: tab===k ? "#000" : C.muted,
            }}>{l}</button>
          ))}
        </div>

        <Card style={{ padding:28 }}>
          {tab==="up" && <Field label="Full Name" value={name} onChange={setName} placeholder="Jane Smith" icon="👤" err={errs.name} />}
          <Field label="Email Address" type="email" value={email} onChange={setEmail} placeholder="you@example.com" icon="✉️" err={errs.email} />
          <Field label="Password" type="password" value={pw} onChange={setPw} placeholder="8+ chars · uppercase · number" icon="🔒" err={errs.pw} />
          {tab==="up" && <Field label="Confirm Password" type="password" value={pw2} onChange={setPw2} placeholder="Repeat password" icon="🔒" err={errs.pw2} />}

          <Btn onClick={go} disabled={busy} full style={{ padding:"13px 0", fontSize:15, marginTop:6 }}>
            {busy ? "Please wait…" : tab==="in" ? "Sign In Securely →" : "Create My Account →"}
          </Btn>

          <div style={{ textAlign:"center", marginTop:18, fontSize:11, color:C.muted }}>
            🔐 256-bit TLS encrypted · PCI-DSS compliant · No data sold
          </div>
        </Card>
      </div>
    </div>
  );
}

// ── SUBSCRIPTION MODAL ────────────────────────────────────────────────────────
function SubModal({ onClose, onDone, current }) {
  const [sel, setSel]       = useState(null);
  const [step, setStep]     = useState("plans");
  const [method, setMethod] = useState("card");
  const [cn, setCn]         = useState("");
  const [ce, setCe]         = useState("");
  const [cv, setCv]         = useState("");
  const [ch, setCh]         = useState("");
  const [pp, setPp]         = useState("");
  const [busy, setBusy]     = useState(false);

  const pay = async () => {
    setBusy(true);
    await new Promise(r => setTimeout(r, 1800));
    setBusy(false);
    setStep("done");
    setTimeout(() => { onDone(sel); onClose(); }, 2000);
  };

  return (
    <Modal
      title={step==="plans"?"Choose Your Plan":step==="pay"?"Secure Checkout":"Payment Confirmed!"}
      onClose={onClose}
    >
      {step==="plans" && (
        <>
          {PLANS.map(p => (
            <div key={p.id} onClick={()=>setSel(p)} style={{
              border:`2px solid ${sel?.id===p.id ? p.color : C.border}`,
              borderRadius:12, padding:"16px 18px", marginBottom:12,
              cursor:"pointer", transition:"all .18s",
              background: sel?.id===p.id ? p.color+"0c" : C.panel,
            }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <span style={{ fontWeight:800, color:p.color, fontSize:17 }}>{p.name}</span>
                <span style={{ fontWeight:900, color:C.text, fontSize:20 }}>
                  ${p.price}<span style={{ fontSize:12, color:C.muted, fontWeight:400 }}>/mo</span>
                </span>
              </div>
              {p.perks.map(pk => (
                <div key={pk} style={{ fontSize:13, color:C.sub, marginBottom:2 }}>✓ {pk}</div>
              ))}
              {current===p.id && <div style={{ marginTop:8 }}><Tag color={p.color}>Current Plan</Tag></div>}
            </div>
          ))}
          <Btn onClick={()=>sel&&setStep("pay")} disabled={!sel} full style={{ marginTop:4 }}>
            Continue to Payment →
          </Btn>
        </>
      )}

      {step==="pay" && (
        <>
          <div style={{ background:C.panel, borderRadius:10, padding:"12px 16px", marginBottom:20,
            display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ color:C.sub }}>Plan: <strong style={{ color:C.text }}>{sel.name}</strong></span>
            <span style={{ color:sel.color, fontWeight:900, fontSize:16 }}>${sel.price}/mo</span>
          </div>

          <div style={{ display:"flex", gap:8, marginBottom:20 }}>
            {[["card","💳 Card"],["paypal","🅿 PayPal"]].map(([k,l]) => (
              <button key={k} onClick={()=>setMethod(k)} style={{
                flex:1, padding:"10px 0", borderRadius:9, fontFamily:"inherit",
                border:`1.5px solid ${method===k?C.accent:C.border}`,
                background: method===k?C.accent+"18":C.panel,
                color: method===k?C.accent:C.muted,
                cursor:"pointer", fontWeight:700, fontSize:13,
              }}>{l}</button>
            ))}
          </div>

          {method==="card" && (
            <>
              <Field label="Cardholder Name" value={ch} onChange={setCh} placeholder="Jane Smith" />
              <Field label="Card Number" value={cn}
                onChange={v=>setCn(v.replace(/\D/g,"").slice(0,16))}
                placeholder="1234 5678 9012 3456" icon="💳" />
              <div style={{ display:"flex", gap:12 }}>
                <div style={{ flex:1 }}><Field label="Expiry" value={ce} onChange={setCe} placeholder="MM/YY" /></div>
                <div style={{ flex:1 }}><Field label="CVV" type="password" value={cv} onChange={v=>setCv(v.slice(0,4))} placeholder="•••" /></div>
              </div>
            </>
          )}
          {method==="paypal" && (
            <Field label="PayPal Email" type="email" value={pp} onChange={setPp} placeholder="you@paypal.com" icon="🅿" />
          )}

          <div style={{ background:C.panel, borderRadius:8, padding:"10px 12px", fontSize:11, color:C.muted, marginBottom:16 }}>
            🔐 Payments encrypted end-to-end. Card details never stored on our servers.
          </div>

          <div style={{ display:"flex", gap:10 }}>
            <Btn ghost color={C.muted} onClick={()=>setStep("plans")} style={{ flex:1 }}>← Back</Btn>
            <Btn color={sel.color} onClick={pay} disabled={busy} style={{ flex:2 }}>
              {busy ? "Processing…" : `Pay $${sel.price}/mo`}
            </Btn>
          </div>
        </>
      )}

      {step==="done" && (
        <div style={{ textAlign:"center", padding:"28px 0" }}>
          <div style={{ fontSize:72 }}>✅</div>
          <h3 style={{ color:C.success, marginTop:18, marginBottom:8 }}>You're subscribed!</h3>
          <p style={{ color:C.sub, margin:0 }}>{sel?.name} plan is now active. Start applying!</p>
        </div>
      )}
    </Modal>
  );
}

// ── JOB BOARD ─────────────────────────────────────────────────────────────────
function JobBoard({ user, jobs, onSubscribe, onApply, appliedIds }) {
  const [q, setQ]         = useState("");
  const [tag, setTag]     = useState("All");
  const [applyTo, setApplyTo] = useState(null);
  const [cover, setCover] = useState("");
  const [port, setPort]   = useState("");
  const [busy, setBusy]   = useState(false);

  const canApply = !!user?.plan;
  const allTags  = ["All", ...new Set(SEED_JOBS.map(j=>j.tag))];

  const visible = jobs.filter(j =>
    (!q || j.title.toLowerCase().includes(q.toLowerCase()) || j.company.toLowerCase().includes(q.toLowerCase())) &&
    (tag==="All" || j.tag===tag)
  );

  const submit = async () => {
    setBusy(true);
    await new Promise(r => setTimeout(r, 900));
    onApply(applyTo);
    setApplyTo(null); setCover(""); setPort("");
    setBusy(false);
  };

  return (
    <div className="fade">
      {/* Search */}
      <input value={q} onChange={e=>setQ(e.target.value)}
        placeholder="🔍  Search job title or company…"
        style={{ width:"100%", padding:"13px 16px", background:C.card, border:`1px solid ${C.border}`,
          borderRadius:10, color:C.text, fontSize:15, outline:"none", fontFamily:"inherit", marginBottom:12 }} />

      {/* Tag filters */}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:20 }}>
        {allTags.map(t => (
          <button key={t} onClick={()=>setTag(t)} style={{
            padding:"6px 14px", borderRadius:99, fontFamily:"inherit",
            border:`1px solid ${tag===t?C.accent:C.border}`,
            background: tag===t?C.accent+"18":"transparent",
            color: tag===t?C.accent:C.muted,
            cursor:"pointer", fontSize:12, fontWeight:700,
          }}>{t}</button>
        ))}
      </div>

      {/* Subscribe banner */}
      {!canApply && (
        <div style={{ background:`linear-gradient(135deg,${C.gold}14,${C.accent}08)`,
          border:`1px solid ${C.gold}33`, borderRadius:14, padding:"16px 20px", marginBottom:20,
          display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12 }}>
          <div>
            <div style={{ fontWeight:800, color:C.gold, fontSize:15 }}>Subscribe to apply</div>
            <div style={{ color:C.sub, fontSize:13, marginTop:3 }}>Plans from $10/mo · Cancel anytime</div>
          </div>
          <Btn color={C.gold} onClick={onSubscribe}>See Plans →</Btn>
        </div>
      )}

      {/* Jobs */}
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {visible.map(job => {
          const done = appliedIds.includes(job.id);
          return (
            <Card key={job.id} style={{ display:"flex", alignItems:"center", gap:16,
              flexWrap:"wrap", padding:"18px 20px", borderLeft:`3px solid ${job.bg}` }}>
              <div style={{ width:48, height:48, borderRadius:12, background:job.bg, flexShrink:0,
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:18, fontWeight:900, color:"#fff" }}>
                {job.logo}
              </div>
              <div style={{ flex:1, minWidth:150 }}>
                <div style={{ fontWeight:800, color:C.text, fontSize:15 }}>{job.title}</div>
                <div style={{ color:C.sub, fontSize:13, marginTop:2 }}>{job.company} · {job.loc}</div>
                <div style={{ display:"flex", gap:8, marginTop:8, flexWrap:"wrap", alignItems:"center" }}>
                  <Tag color={C.accent}>{job.salary}</Tag>
                  <Tag color={C.muted}>{job.tag}</Tag>
                  <span style={{ color:C.muted, fontSize:11 }}>🕐 {job.posted}</span>
                </div>
              </div>
              <Btn
                color={done ? C.success : C.accent}
                ghost={done}
                disabled={done}
                onClick={() => { if (!canApply) { onSubscribe(); return; } if (!done) setApplyTo(job); }}
              >
                {done ? "✓ Applied" : canApply ? "Apply Now" : "🔒 Apply"}
              </Btn>
            </Card>
          );
        })}
        {visible.length===0 && (
          <div style={{ textAlign:"center", color:C.muted, padding:64 }}>No jobs match your search.</div>
        )}
      </div>

      {/* Apply modal */}
      {applyTo && (
        <Modal title={`Apply — ${applyTo.title}`} onClose={()=>setApplyTo(null)}>
          <div style={{ background:C.panel, borderRadius:10, padding:"12px 16px", marginBottom:18 }}>
            <div style={{ fontWeight:700, color:C.text }}>{applyTo.company}</div>
            <div style={{ color:C.sub, fontSize:13 }}>{applyTo.loc} · {applyTo.salary}</div>
          </div>
          <Field label="Cover Letter (optional)" value={cover} onChange={setCover}
            placeholder="Why are you a great fit?" rows={3} />
          <Field label="LinkedIn or Portfolio URL" value={port} onChange={setPort}
            placeholder="https://linkedin.com/in/you" icon="🔗" />
          <div style={{ display:"flex", gap:10, marginTop:4 }}>
            <Btn ghost color={C.muted} onClick={()=>setApplyTo(null)} style={{ flex:1 }}>Cancel</Btn>
            <Btn disabled={busy} onClick={submit} style={{ flex:2 }}>
              {busy ? "Submitting…" : "Submit Application 🚀"}
            </Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── MY ACCOUNT ────────────────────────────────────────────────────────────────
function MyAccount({ user, onSubscribe, applications }) {
  const plan = PLANS.find(p=>p.id===user.plan);
  const mine = applications.filter(a=>a.uid===user.id);

  return (
    <div className="fade">
      {/* Stats */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))", gap:14, marginBottom:22 }}>
        {[
          { icon:"🪪", label:"Plan",         val: plan?.name||"Free",  color: plan?.color||C.muted },
          { icon:"🚀", label:"Applications", val: mine.length,          color: C.accent },
          { icon:"🔐", label:"Security",     val: "Verified",           color: C.success },
        ].map(s => (
          <Card key={s.label} style={{ borderColor:s.color+"44" }}>
            <div style={{ fontSize:26, marginBottom:8 }}>{s.icon}</div>
            <div style={{ fontSize:24, fontWeight:900, color:s.color }}>{s.val}</div>
            <div style={{ color:C.muted, fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:.8, marginTop:2 }}>{s.label}</div>
          </Card>
        ))}
      </div>

      {/* Plan info */}
      {plan ? (
        <Card style={{ borderColor:plan.color+"44", marginBottom:20 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:12 }}>
            <div>
              <div style={{ fontWeight:800, color:plan.color, fontSize:17 }}>{plan.name} Plan</div>
              <div style={{ color:C.sub, fontSize:13, marginTop:4 }}>${plan.price}/mo · Renews automatically</div>
            </div>
            <Btn ghost color={plan.color} sm onClick={onSubscribe}>Change Plan</Btn>
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:16 }}>
            {plan.perks.map(p => <Tag key={p} color={plan.color}>{p}</Tag>)}
          </div>
        </Card>
      ) : (
        <Card style={{ borderColor:C.gold+"44", background:C.gold+"08", marginBottom:20 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12 }}>
            <div>
              <div style={{ fontWeight:800, color:C.gold }}>No active subscription</div>
              <div style={{ color:C.sub, fontSize:13, marginTop:4 }}>Subscribe to start applying to jobs</div>
            </div>
            <Btn color={C.gold} onClick={onSubscribe}>Choose a Plan →</Btn>
          </div>
        </Card>
      )}

      {/* History */}
      <Card>
        <div style={{ fontWeight:800, color:C.text, fontSize:15, marginBottom:18 }}>Application History</div>
        {mine.length===0
          ? <div style={{ color:C.muted, fontSize:14 }}>No applications yet. Browse jobs and start applying!</div>
          : mine.map((a,i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
              padding:"12px 0", borderBottom: i<mine.length-1?`1px solid ${C.border}`:"none" }}>
              <div>
                <div style={{ fontWeight:700, color:C.text }}>{a.title}</div>
                <div style={{ color:C.sub, fontSize:13 }}>{a.company}</div>
              </div>
              <Tag color={C.success}>Submitted</Tag>
            </div>
          ))
        }
      </Card>
    </div>
  );
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function Admin({ users, setUsers, jobs, setJobs, applications, withdrawals, setWithdrawals }) {
  const [tab, setTab]       = useState("overview");
  const [wOpen, setWOpen]   = useState(false);
  const [wMethod, setWM]    = useState("paypal");
  const [wAmt, setWAmt]     = useState("");
  const [wEmail, setWEmail] = useState("");
  const [wBusy, setWBusy]   = useState(false);
  const [wDone, setWDone]   = useState(false);
  const [addJob, setAddJob] = useState(false);
  const [nj, setNj]         = useState({ title:"",company:"",loc:"",salary:"",tag:"Engineering",logo:"",bg:"#333" });

  const members = users.filter(u=>u.role!=="admin");
  const revenue = members.reduce((s,u)=>s+(PLANS.find(p=>p.id===u.plan)?.price||0),0);

  const doWithdraw = async () => {
    if (!wAmt||!wEmail||parseFloat(wAmt)<10) return;
    setWBusy(true);
    await new Promise(r=>setTimeout(r,1600));
    setWithdrawals(p=>[...p,{
      id:Date.now(), amt:wAmt, method:wMethod,
      email:wEmail, date:new Date().toLocaleDateString(), status:"completed"
    }]);
    setWBusy(false); setWDone(true);
  };

  const postJob = () => {
    if (!nj.title||!nj.company) return;
    setJobs(p=>[...p,{ ...nj, id:Date.now(), posted:"just now",
      logo: nj.logo||nj.company[0].toUpperCase() }]);
    setNj({ title:"",company:"",loc:"",salary:"",tag:"Engineering",logo:"",bg:"#333" });
    setAddJob(false);
  };

  const TABS = ["overview","users","jobs","withdrawals","security"];

  return (
    <div className="fade">
      {/* Admin banner */}
      <div style={{ background:C.danger+"0d", border:`1px solid ${C.danger}33`, borderRadius:12,
        padding:"12px 18px", marginBottom:24, display:"flex", justifyContent:"space-between",
        alignItems:"center", flexWrap:"wrap", gap:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:22 }}>🛡</span>
          <div>
            <span style={{ color:C.danger, fontWeight:800, fontSize:14 }}>ADMIN PANEL</span>
            <span style={{ color:C.muted, fontSize:12, marginLeft:10 }}>Restricted · {ADMIN_EMAIL}</span>
          </div>
        </div>
        <Btn color={C.gold} onClick={()=>{ setWOpen(true); setWDone(false); setWAmt(""); setWEmail(""); }}>
          💰 Withdraw Funds
        </Btn>
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", gap:6, marginBottom:24, flexWrap:"wrap" }}>
        {TABS.map(t => (
          <button key={t} onClick={()=>setTab(t)} style={{
            padding:"8px 18px", borderRadius:9, fontFamily:"inherit",
            border:`1px solid ${tab===t?C.accent:C.border}`,
            background: tab===t?C.accent+"18":"transparent",
            color: tab===t?C.accent:C.muted,
            cursor:"pointer", fontWeight:700, fontSize:13, textTransform:"capitalize",
          }}>{t}</button>
        ))}
      </div>

      {/* OVERVIEW */}
      {tab==="overview" && (
        <>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:14, marginBottom:22 }}>
            {[
              { icon:"💰", label:"Monthly Revenue", val:`$${revenue}`,          color:C.gold   },
              { icon:"👥", label:"Total Users",      val:members.length,         color:C.accent },
              { icon:"📋", label:"Active Jobs",      val:jobs.length,            color:C.purple },
              { icon:"🚀", label:"Applications",     val:applications.length,    color:C.success},
            ].map(s => (
              <Card key={s.label} style={{ borderColor:s.color+"44" }}>
                <div style={{ fontSize:26, marginBottom:8 }}>{s.icon}</div>
                <div style={{ fontSize:26, fontWeight:900, color:s.color }}>{s.val}</div>
                <div style={{ color:C.muted, fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:.8, marginTop:2 }}>{s.label}</div>
              </Card>
            ))}
          </div>
          <Card>
            <div style={{ fontWeight:800, color:C.text, fontSize:15, marginBottom:18 }}>Revenue by Plan</div>
            {PLANS.map(p => {
              const count = members.filter(u=>u.plan===p.id).length;
              const rev   = count * p.price;
              const pct   = revenue > 0 ? rev/revenue*100 : 0;
              return (
                <div key={p.id} style={{ marginBottom:16 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                    <span style={{ color:C.text, fontWeight:600, fontSize:13 }}>{p.name} · {count} subscribers</span>
                    <span style={{ color:p.color, fontWeight:800 }}>${rev}/mo</span>
                  </div>
                  <div style={{ background:C.panel, borderRadius:99, height:6 }}>
                    <div style={{ width:`${pct}%`, background:p.color, height:6, borderRadius:99, transition:"width .6s" }} />
                  </div>
                </div>
              );
            })}
          </Card>
        </>
      )}

      {/* USERS */}
      {tab==="users" && (
        <Card>
          <div style={{ fontWeight:800, color:C.text, fontSize:15, marginBottom:18 }}>
            All Users ({members.length})
          </div>
          <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead>
                <tr>
                  {["Name","Email","Plan","Status","Joined","Actions"].map(h => (
                    <th key={h} style={{ padding:"9px 12px", textAlign:"left", color:C.muted,
                      fontWeight:700, borderBottom:`1px solid ${C.border}`, fontSize:11,
                      textTransform:"uppercase", letterSpacing:.8 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {members.map(u => {
                  const pl = PLANS.find(p=>p.id===u.plan);
                  return (
                    <tr key={u.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                      <td style={{ padding:"12px", color:C.text, fontWeight:600 }}>{u.name}</td>
                      <td style={{ padding:"12px", color:C.sub, fontSize:12 }}>{u.email}</td>
                      <td style={{ padding:"12px" }}>
                        {pl ? <Tag color={pl.color}>{pl.name}</Tag> : <Tag color={C.muted}>Free</Tag>}
                      </td>
                      <td style={{ padding:"12px" }}>
                        <Tag color={u.status==="active"?C.success:C.danger}>{u.status}</Tag>
                      </td>
                      <td style={{ padding:"12px", color:C.muted, fontSize:12 }}>{u.joined}</td>
                      <td style={{ padding:"12px" }}>
                        <div style={{ display:"flex", gap:6 }}>
                          <Btn sm ghost color={C.muted}
                            onClick={()=>setUsers(p=>p.map(x=>x.id===u.id
                              ?{...x,status:x.status==="active"?"suspended":"active"}:x))}>
                            {u.status==="active"?"Suspend":"Restore"}
                          </Btn>
                          <Btn sm ghost color={C.danger}
                            onClick={()=>{ if(window.confirm("Delete this user permanently?"))
                              setUsers(p=>p.filter(x=>x.id!==u.id)); }}>
                            Delete
                          </Btn>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {members.length===0 && (
              <div style={{ textAlign:"center", color:C.muted, padding:36 }}>No users registered yet.</div>
            )}
          </div>
        </Card>
      )}

      {/* JOBS */}
      {tab==="jobs" && (
        <>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
            <div style={{ fontWeight:800, color:C.text, fontSize:15 }}>Job Listings ({jobs.length})</div>
            <Btn onClick={()=>setAddJob(true)}>+ Post Job</Btn>
          </div>
          {jobs.map(j => (
            <Card key={j.id} style={{ display:"flex", alignItems:"center", gap:14,
              marginBottom:10, padding:"16px 18px", flexWrap:"wrap" }}>
              <div style={{ width:40, height:40, borderRadius:10, background:j.bg, flexShrink:0,
                display:"flex", alignItems:"center", justifyContent:"center",
                color:"#fff", fontWeight:900, fontSize:16 }}>
                {j.logo}
              </div>
              <div style={{ flex:1, minWidth:140 }}>
                <div style={{ fontWeight:700, color:C.text }}>{j.title}</div>
                <div style={{ color:C.sub, fontSize:13 }}>{j.company} · {j.loc} · {j.salary}</div>
              </div>
              <Btn sm ghost color={C.danger}
                onClick={()=>setJobs(p=>p.filter(x=>x.id!==j.id))}>
                Remove
              </Btn>
            </Card>
          ))}
          {addJob && (
            <Modal title="Post New Job" onClose={()=>setAddJob(false)}>
              <Field label="Job Title *"    value={nj.title}   onChange={v=>setNj(p=>({...p,title:v}))}   placeholder="Senior Engineer"  />
              <Field label="Company *"      value={nj.company} onChange={v=>setNj(p=>({...p,company:v}))} placeholder="Acme Inc."        />
              <Field label="Location"       value={nj.loc}     onChange={v=>setNj(p=>({...p,loc:v}))}     placeholder="Remote / City"    />
              <Field label="Salary Range"   value={nj.salary}  onChange={v=>setNj(p=>({...p,salary:v}))}  placeholder="$80k–$100k"       />
              <Field label="Logo Letter"    value={nj.logo}    onChange={v=>setNj(p=>({...p,logo:v.slice(0,1).toUpperCase()}))} placeholder="A" />
              <Btn full onClick={postJob}>Publish Job →</Btn>
            </Modal>
          )}
        </>
      )}

      {/* WITHDRAWALS */}
      {tab==="withdrawals" && (
        <Card>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
            marginBottom:20, flexWrap:"wrap", gap:12 }}>
            <div style={{ fontWeight:800, color:C.text, fontSize:15 }}>Withdrawal History</div>
            <div style={{ background:C.gold+"14", border:`1px solid ${C.gold}33`, borderRadius:10, padding:"10px 16px" }}>
              <span style={{ color:C.muted, fontSize:12 }}>Balance: </span>
              <span style={{ color:C.gold, fontWeight:900, fontSize:22 }}>${revenue}</span>
            </div>
          </div>
          {withdrawals.length===0
            ? <div style={{ color:C.muted }}>No withdrawals yet. Use "Withdraw Funds" above.</div>
            : withdrawals.map(w => (
              <div key={w.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                padding:"13px 0", borderBottom:`1px solid ${C.border}`, flexWrap:"wrap", gap:8 }}>
                <div>
                  <div style={{ fontWeight:700, color:C.text }}>
                    ${w.amt} via {w.method==="paypal"?"PayPal":w.method==="payfast"?"PayFast":"Bank Card"}
                  </div>
                  <div style={{ color:C.sub, fontSize:13 }}>{w.email} · {w.date}</div>
                </div>
                <Tag color={w.status==="completed"?C.success:C.gold}>{w.status}</Tag>
              </div>
            ))
          }
        </Card>
      )}

      {/* SECURITY */}
      {tab==="security" && (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(230px,1fr))", gap:14 }}>
          {[
            { icon:"🔐", t:"TLS 1.3 Encryption",      d:"All traffic encrypted end-to-end.",              s:"Active"      },
            { icon:"🏦", t:"PCI-DSS Compliance",       d:"Card data processed by Stripe, never stored.",   s:"Active"      },
            { icon:"🛡", t:"Row Level Security",        d:"Users can only access their own data.",          s:"Active"      },
            { icon:"🔑", t:"Password Hashing",          d:"bcrypt + salt. Never stored in plaintext.",      s:"Active"      },
            { icon:"📧", t:"Email Verification",        d:"All accounts require email confirmation.",       s:"Active"      },
            { icon:"⛔", t:"Brute-Force Protection",    d:"5 failed logins = 30-min account lockout.",      s:"Active"      },
            { icon:"💾", t:"Daily Backups",             d:"Automated encrypted database snapshots.",        s:"Active"      },
            { icon:"📲", t:"Admin 2FA",                 d:"Enable two-factor auth on your admin account.",  s:"Recommended" },
          ].map(s => (
            <Card key={s.t} style={{ borderColor: s.s==="Active"?C.success+"33":C.gold+"33" }}>
              <div style={{ fontSize:28, marginBottom:10 }}>{s.icon}</div>
              <div style={{ fontWeight:700, color:C.text, marginBottom:6 }}>{s.t}</div>
              <div style={{ color:C.sub, fontSize:13, marginBottom:14 }}>{s.d}</div>
              <Tag color={s.s==="Active"?C.success:C.gold}>{s.s}</Tag>
            </Card>
          ))}
        </div>
      )}

      {/* WITHDRAW MODAL */}
      {wOpen && (
        <Modal title="Withdraw Funds" onClose={()=>setWOpen(false)}>
          {wDone ? (
            <div style={{ textAlign:"center", padding:"28px 0" }}>
              <div style={{ fontSize:68 }}>✅</div>
              <h3 style={{ color:C.success, marginTop:18 }}>Withdrawal Initiated!</h3>
              <p style={{ color:C.sub, marginTop:8 }}>Funds arrive within 1–3 business days.</p>
            </div>
          ) : (
            <>
              <div style={{ background:C.panel, borderRadius:10, padding:"14px 18px", marginBottom:20 }}>
                <div style={{ color:C.muted, fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:.8, marginBottom:4 }}>
                  Available Balance
                </div>
                <div style={{ fontSize:36, fontWeight:900, color:C.gold }}>${revenue}.00</div>
              </div>

              {/* Method selector */}
              <div style={{ display:"flex", gap:8, marginBottom:20 }}>
                {[["paypal","🅿 PayPal"],["payfast","⚡ PayFast"],["card","💳 Bank Card"]].map(([k,l]) => (
                  <button key={k} onClick={()=>setWM(k)} style={{
                    flex:1, padding:"9px 4px", borderRadius:9, fontFamily:"inherit",
                    border:`1.5px solid ${wMethod===k?C.gold:C.border}`,
                    background: wMethod===k?C.gold+"14":C.panel,
                    color: wMethod===k?C.gold:C.muted,
                    cursor:"pointer", fontWeight:700, fontSize:12,
                  }}>{l}</button>
                ))}
              </div>

              <Field
                label={wMethod==="paypal"?"PayPal Email":wMethod==="payfast"?"PayFast Merchant Email":"Bank Account Email"}
                type="email" value={wEmail} onChange={setWEmail}
                placeholder={wMethod==="paypal"?"you@paypal.com":wMethod==="payfast"?"merchant@payfast.co.za":"account@bank.com"}
                icon="📧"
              />
              <Field label="Amount to Withdraw ($)" type="number"
                value={wAmt} onChange={setWAmt} placeholder="Minimum $10" icon="💵" />

              <div style={{ background:C.panel, borderRadius:8, padding:"10px 12px",
                fontSize:11, color:C.muted, marginBottom:16 }}>
                🔒 Minimum $10 · Secure processing · 1–3 business days
              </div>

              <Btn color={C.gold} full
                disabled={wBusy||!wEmail||!wAmt||parseFloat(wAmt)<10}
                onClick={doWithdraw}>
                {wBusy?"Processing…":`Withdraw via ${wMethod==="paypal"?"PayPal":wMethod==="payfast"?"PayFast":"Bank Card"}`}
              </Btn>
            </>
          )}
        </Modal>
      )}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser]           = useState(null);
  const [users, setUsers]         = useState([]);
  const [jobs, setJobs]           = useState(SEED_JOBS);
  const [applications, setApps]   = useState([]);
  const [withdrawals, setWDs]     = useState([]);
  const [appliedIds, setAIds]     = useState([]);
  const [page, setPage]           = useState("jobs");
  const [subOpen, setSubOpen]     = useState(false);
  const [toast, setToast]         = useState(null);

  const fire = (msg, color=C.accent) => {
    setToast({ msg, color });
    setTimeout(()=>setToast(null), 3200);
  };

  const login = (email, pw) => {
    if (email===ADMIN_EMAIL && pw===ADMIN_PASS) {
      setUser({ id:"admin", email:ADMIN_EMAIL, name:"Admin", role:"admin", plan:"pro" });
      setPage("admin"); fire("Welcome back, Admin 🛡", C.gold); return;
    }
    const found = users.find(u=>u.email===email && u.password===pw);
    if (!found)                     { fire("Invalid email or password.", C.danger); return; }
    if (found.status==="suspended") { fire("Account suspended. Contact support.", C.danger); return; }
    setUser(found); setPage("jobs");
    fire(`Welcome back, ${found.name.split(" ")[0]}!`);
  };

  const register = (email, name, pw) => {
    if (email===ADMIN_EMAIL)              { fire("Email not available.", C.danger); return; }
    if (users.find(u=>u.email===email))   { fire("Email already registered.", C.danger); return; }
    const u = { id:`u${Date.now()}`, email, name, password:pw, role:"user",
                plan:null, status:"active", joined:new Date().toLocaleDateString() };
    setUsers(p=>[...p,u]); setUser(u); setPage("jobs");
    fire("Account created! Choose a plan to start applying 🎉", C.success);
    setTimeout(()=>setSubOpen(true), 900);
  };

  const subscribe = (plan) => {
    setUser(u=>({...u, plan:plan.id}));
    setUsers(p=>p.map(u=>u.id===user.id?{...u,plan:plan.id}:u));
    fire(`${plan.name} plan activated! 🎉`, plan.color);
  };

  const applyJob = (job) => {
    setAIds(p=>[...p, job.id]);
    setApps(p=>[...p,{ id:Date.now(), uid:user.id, title:job.title, company:job.company }]);
    fire(`Applied to ${job.title} ✓`, C.success);
  };

  const logout = () => { setUser(null); setPage("jobs"); setAIds([]); fire("Signed out securely."); };

  if (!user) return (
    <>
      <AuthPage onLogin={login} onRegister={register} />
      {toast && <Toast {...toast} />}
    </>
  );

  const isAdmin = user.role==="admin";
  const plan    = PLANS.find(p=>p.id===user.plan);
  const NAV     = isAdmin
    ? [["admin","🛡 Admin"]]
    : [["jobs","💼 Jobs"],["account","👤 Account"]];

  return (
    <div style={{ minHeight:"100vh", background:C.bg }}>
      {/* Navbar */}
      <nav style={{ background:C.panel, borderBottom:`1px solid ${C.border}`,
        padding:"0 20px", height:58, display:"flex", alignItems:"center",
        justifyContent:"space-between", position:"sticky", top:0, zIndex:50, flexWrap:"wrap", gap:8 }}>
        <div style={{ fontSize:22, fontWeight:900, letterSpacing:-1 }}>
          <span style={{ color:C.accent }}>Work</span><span style={{ color:C.text }}>Vault</span>
        </div>
        <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
          {NAV.map(([k,l]) => (
            <button key={k} onClick={()=>setPage(k)} style={{
              padding:"7px 16px", borderRadius:8, fontFamily:"inherit",
              border:`1px solid ${page===k?C.accent:"transparent"}`,
              background: page===k?C.accent+"18":"none",
              color: page===k?C.accent:C.muted,
              cursor:"pointer", fontWeight:700, fontSize:13,
            }}>{l}</button>
          ))}
          {!isAdmin && (
            <Btn color={plan?plan.color:C.gold} ghost={!!plan}
              onClick={()=>setSubOpen(true)} style={{ padding:"7px 14px", fontSize:13 }}>
              {plan ? `⭐ ${plan.name}` : "Subscribe"}
            </Btn>
          )}
          <Btn ghost color={C.muted} onClick={logout} style={{ padding:"7px 14px", fontSize:13 }}>
            Sign Out
          </Btn>
        </div>
      </nav>

      {/* Content */}
      <main style={{ maxWidth:980, margin:"0 auto", padding:"32px 18px" }}>
        {!isAdmin && (
          <div style={{ marginBottom:26 }}>
            <h1 style={{ margin:"0 0 6px", fontSize:27, fontWeight:900, color:C.text }}>
              {page==="jobs" ? "Discover Hidden Roles" : `Hi, ${user.name.split(" ")[0]}`}
            </h1>
            <p style={{ margin:0, color:C.sub, fontSize:14 }}>
              {page==="jobs"
                ? "Sourced directly from company career pages — before they appear anywhere else."
                : "Your subscription, applications, and account settings."}
            </p>
          </div>
        )}

        {page==="jobs"    && <JobBoard user={user} jobs={jobs} onSubscribe={()=>setSubOpen(true)} onApply={applyJob} appliedIds={appliedIds} />}
        {page==="account" && <MyAccount user={user} onSubscribe={()=>setSubOpen(true)} applications={applications} />}
        {page==="admin"   && isAdmin && <Admin users={users} setUsers={setUsers} jobs={jobs} setJobs={setJobs} applications={applications} withdrawals={withdrawals} setWithdrawals={setWDs} />}
      </main>

      {subOpen && <SubModal onClose={()=>setSubOpen(false)} onDone={subscribe} current={user?.plan} />}
      {toast && <Toast {...toast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
